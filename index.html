<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Love Story ❤️</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<nav>
  <h1>Dikanaelinn ❤️</h1>
</nav>

<section class="hero">
  <div class="hero-content">
    <h2>Our Love Story</h2>
    <p>Kisah kita, versi paling indah.</p>
    <button class="btn" onclick="scrollToSection()">Play</button>
  </div>
</section>

<section class="section" id="gallery">
  <h2>Our Memories</h2>

  <div class="cards">
    <div class="card" onclick="openModal('First Chat', 'Awal kita kenal... ❤️')">
      <img src="images/foto121.jpg">
      <div class="card-title">First Chat</div>
    </div>

    <div class="card" onclick="openModal('First Date', 'Hari pertama kita jalan bareng 🥹')">
      <img src="images/foto2.jpg">
      <div class="card-title">First Date</div>
    </div>

    <div class="card" onclick="openModal('Favorite Moment', 'Moment paling aku suka ❤️')">
      <img src="images/foto3.jpg">
      <div class="card-title">Favorite</div>
    </div>
  </div>
</section>

<section class="section">
  <h2>For You 💌</h2>
  <div class="love-letter">
    <p>
      Aku mungkin bukan yang sempurna, tapi aku selalu berusaha jadi yang terbaik buat kamu.
      Terima kasih sudah hadir di hidupku ❤️
    </p>
  </div>
</section>

<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">X</span>
    <h2 id="modal-title"></h2>
    <p id="modal-text"></p>
  </div>
</div>

<audio id="music" src="music.mp3"></audio>
<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script src="script.js"></script>
</body>
</html>
